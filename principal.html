<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Citas - MR. Firulays</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/principal.css">
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-paw logo-icon"></i>
                <div class="logo-text">
                    <span>MR.Firulays</span>
                    <p class="sub-logo">Clínica Veterinaria</p>
                </div>
            </div>

            <ul class="nav-menu">
                <li class="active"><a href="principal.html"><i class="far fa-calendar-alt"></i> MIS CITAS</a></li>
                <li><a href="mascotas.html"><i class="fas fa-dog"></i> MIS MASCOTAS</a></li>
                <li><a href="pagos.html"><i class="fas fa-credit-card"></i> PAGOS</a></li>
                <li><a href="reclamos.html"><i class="far fa-comment-dots"></i> RECLAMOS/QUEJA</a></li>
            </ul>

            <div class="user-profile">
                <!-- El contenedor de la foto se llenará vía JS -->
                <div id="userPhotoContainer" class="user-photo"></div>
                <span id="userNameDisplay"></span> 
            </div>
        </div>
    </nav>

    <main class="dashboard-wrapper">
        <header class="welcome-header">
            <div class="welcome-info">
                <div class="icon-calendar-circle">
                    <i class="far fa-calendar-alt"></i>
                </div>
                <!-- Este h1 recibirá el nombre automático -->
                <h1 id="welcomeMessage"></h1>
            </div>
            <button class="btn-agendar-pro">
                <i class="fas fa-plus"></i> Agendar nueva cita
            </button>
        </header>

        <section class="citas-section">
            <h2 class="section-title">Próximas citas</h2>
            <div id="citasContainer" class="citas-grid">
                <!-- Se mantiene vacío hasta que el usuario agregue datos -->
                <div class="no-citas">
                    <p>Aún no tienes citas programadas. ¡Agenda una arriba!</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-left">
                <span>Búscanos en nuestras redes:</span>
                <a href="#"><img src="https://img.icons8.com/color/48/instagram-new.png" alt="IG"> Instagram</a>
                <a href="#"><img src="https://img.icons8.com/color/48/facebook-new.png" alt="FB"> Facebook</a>
            </div>
            <div class="footer-right">
                <span>Mándanos un mensaje:</span>
                <a href="#"><img src="https://img.icons8.com/color/48/whatsapp.png" alt="WA"> WhatsApp</a>
                <span>Correo:</span>
                <a href="mailto:Mstr.Firulays@gmail.com"><i class="fas fa-envelope"></i> Mstr.Firulays@gmail.com</a>
            </div>
        </div>
    </footer>

    <script type="module" src="js/principal.js"></script>
</body>
</html>
